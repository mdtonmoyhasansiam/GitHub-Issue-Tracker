<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title & Favicon -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Raw CSS -->
    <link rel="stylesheet" href="./style/style.css">

    <!-- Tailwind CSS & Daisy UI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- Font Awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVIGATION BAR -->
  <header class="bg-white mb-[60px]">

    <div class="navbar bg-base-100 shadow-sm px-4 md:px-10 lg:px-20">

      <!-- LEFT SECTION -->
      <div class="flex-1">

        <!-- Mobile Menu -->
        <div class="dropdown md:hidden">

          <div tabindex="0" role="button" class="btn btn-ghost p-2">
            <i class="fa-brands fa-github text-2xl"></i>
          </div>

          <ul
            tabindex="0"
            class="dropdown-content menu bg-base-100/70 rounded-box z-10 mt-3 w-52 p-2 shadow"
          >

            <li class="px-2 py-1 text-lg text-center font-semibold">
              GitHub Issues Tracker
            </li>

            <li>
              <a class="flex justify-center" href="./index.html">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                Log Out
              </a>
            </li>

          </ul>

        </div>

        <!-- Desktop Logo -->
        <a class="btn btn-ghost text-xl hidden md:inline-flex">
          <i class="fa-brands fa-github"></i>
          GitHub Issues Tracker
        </a>

      </div>


      <!-- RIGHT SECTION -->
      <div class="flex gap-2 items-center">

        <!-- Search Field -->
        <label class="input">

          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>

          <input
            id="searchInput"
            type="search"
            placeholder="Search issues..."
          />

        </label>

        <!-- Search Button -->
        <button id="searchBtn" class="btn btn-primary">
          Search
        </button>

        <!-- Desktop Logout Button -->
        <a
          id="logout"
          href="./index.html"
          class="btn btn-primary hidden md:flex"
        >
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          Log Out
        </a>

      </div>

    </div>

  </header>


  <!-- MAIN CONTENT -->
  <main class="bg-[#F8FAFC] min-h-screen max-w-[75%] mx-auto">


    <!-- FILTER TABS -->
    <section
      id="tabs"
      class="p-6 flex gap-2 bg-white mb-4 rounded-lg"
    >

      <button
        id="allTab"
        onclick="showTab('allTab')"
        class="btn tab-btn w-[120px] h-10"
      >
        All
      </button>

      <button
        id="openTab"
        onclick="showTab('openTab')"
        class="btn tab-btn w-[120px] h-10"
      >
        Open
      </button>

      <button
        id="closedTab"
        onclick="showTab('closedTab')"
        class="btn tab-btn w-[120px] h-10"
      >
        Closed
      </button>

    </section>


    <!-- ISSUE INFORMATION -->
    <section id="issue-info" class="rounded-lg">

      <div
        class="p-6 flex justify-between items-center bg-white border-b border-[#E4E4E7]"
      >

        <!-- Issue Count -->
        <div class="flex gap-2 items-center">

          <div
            class="w-[50px] h-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center"
          >
            <img class="w-8 h-8" src="../assets/Aperture.png" alt="">
          </div>

          <div>
            <h3 class="mb-[3px] font-semibold text-xl">
              <span id="total-count">0</span> Issues
            </h3>

            <p>
              Track and manage your project issues
            </p>
          </div>

        </div>


        <!-- Status Legend -->
        <div class="flex gap-4">

          <div
            id="open-badge"
            class="flex items-center gap-2"
          >
            <div class="rounded-full w-3 h-3 bg-[#00A96E]"></div>
            Open
          </div>

          <div
            id="closed-badge"
            class="flex items-center gap-2"
          >
            <div class="rounded-full w-3 h-3 bg-[#A855F7]"></div>
            Closed
          </div>

        </div>

      </div>


      <!-- LOADING SPINNER -->
      <div id="spinner" class="hidden">

        <section class="flex justify-center items-center min-h-screen">

          <span
            class="loading loading-spinner loading-xl text-primary"
          ></span>

        </section>

      </div>


      <!-- ISSUE CARDS -->
      <div
        id="card-container"
        class="bg-[#FBFBFB] p-6 mb-[60px] grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"
      >
        <!-- Cards will be loaded dynamically via JavaScript -->
      </div>

    </section>


    <!--  MODAL -->
    <section>

      <dialog
        id="my_modal_5"
        class="modal modal-bottom sm:modal-middle"
      >
        <!-- Modal Content Injected by JavaScript -->
      </dialog>

    </section>

  </main>

  <script src="./script/script.js"></script>
</body>

</html>
